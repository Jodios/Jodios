kind: Deployment
apiVersion: apps/v1
metadata:
  name: jodios
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jodios
  template:
    metadata:
      labels:
        app: jodios 
    spec:
      containers:
        - name: jodios
          image: #{deployment.image.name}#
          ports:
            - name: http-api
              containerPort: 80
              protocol: TCP
          imagePullPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
---
kind: Service
apiVersion: v1
metadata:
  name: jodios
  namespace: prod
  labels:
    version: 0.1.203643-1
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: jodios
---
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
  name: jodios
  namespace: prod
spec:
  tls:
    - hosts:
        - jodios.com
        - www.jodios.com
      secretName: jodios-tls
  rules:
  - host: www.jodios.com
    http:
      paths:
      - backend:
          serviceName: jodios
          servicePort: 80
  - host: jodios.com
    http:
      paths:
      - backend:
          serviceName: jodios
          servicePort: 80